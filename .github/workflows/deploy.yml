name: Deploy EventStan Applications

on:
  push:
   branches:
    - main

jobs:
  deploy:
    runs-on: ubuntu-latest


    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          port: 22
          script: |
            set -e

            cd /var/www/Eventstan

            git pull origin main

            # API
            cd Api
            npm install --force
            npm run build
            pm2 restart eventstan-api || pm2 start dist/main.js --name eventstan-api

            # Admin Panel
            cd ../Enentatan_Admin_Panel
            npm install --force
            npm run build
            pm2 restart eventstan-admin || pm2 start npm --name eventstan-admin -- start

            # Customer Panel
            cd ../Enentstan_Customer_Panel
            npm install --force
            npm run build
            pm2 restart eventstan-customer || pm2 start npm --name eventstan-customer -- start

            # Vendor Panel
            cd ../Enentstan_Vendor_Pannel
            npm install --force
            npm run build
            pm2 restart eventstan-vendor || pm2 start npm --name eventstan-vendor -- start

            pm2 save

            systemctl restart nginx

