name: Deploy EventStan Applications

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy API and panels
    runs-on: ubuntu-latest

    steps:
      - name: Deploy applications on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          script: |
            set -euo pipefail

            APP_DIR="/var/www/EventstanApi"
            API_DIR="$APP_DIR/Api"
            ADMIN_DIR="$APP_DIR/Enentatan_Admin_Panel"
            CUSTOMER_DIR="$APP_DIR/Enentstan_Customer_Panel"
            VENDOR_DIR="$APP_DIR/Enentstan_Vendor_Pannel"

            API_PM2="eventstan-api"
            ADMIN_PM2="eventstan-admin"
            CUSTOMER_PM2="eventstan-customer"
            VENDOR_PM2="eventstan-vendor"

            API_PORT="4000"
            ADMIN_PORT="3001"
            CUSTOMER_PORT="3002"
            VENDOR_PORT="3003"

            API_PUBLIC_URL="https://api.eventstan.com"
            API_PUBLIC_BASE_URL="$API_PUBLIC_URL/api/v1"

            cd "$APP_DIR"
            git fetch origin main
            git pull --ff-only origin main

            echo "Deploying API on port $API_PORT"
            cd "$API_DIR"
            npm ci
            npm run prisma:generate
            npm run db:push
            npm run typecheck
            npm run build

            pm2 delete "$API_PM2" || true
            PORT="$API_PORT" API_PUBLIC_URL="$API_PUBLIC_BASE_URL" pm2 start dist/main.js --name "$API_PM2" --update-env

            echo "Deploying Admin panel on port $ADMIN_PORT"
            cd "$ADMIN_DIR"
            npm ci
            NEXT_PUBLIC_BASE_URL="$API_PUBLIC_URL" npm run build

            pm2 delete "$ADMIN_PM2" || true
            NEXT_PUBLIC_BASE_URL="$API_PUBLIC_URL" pm2 start npm --name "$ADMIN_PM2" -- start -- -p "$ADMIN_PORT"

            echo "Deploying Customer panel on port $CUSTOMER_PORT"
            cd "$CUSTOMER_DIR"
            npm ci
            NEXT_PUBLIC_API_BASE_URL="$API_PUBLIC_BASE_URL" npm run build

            pm2 delete "$CUSTOMER_PM2" || true
            NEXT_PUBLIC_API_BASE_URL="$API_PUBLIC_BASE_URL" pm2 start npm --name "$CUSTOMER_PM2" -- start -- -p "$CUSTOMER_PORT"

            echo "Deploying Vendor panel on port $VENDOR_PORT"
            cd "$VENDOR_DIR"
            npm ci
            NEXT_PUBLIC_BASE_URL="$API_PUBLIC_URL" npm run build

            pm2 delete "$VENDOR_PM2" || true
            NEXT_PUBLIC_BASE_URL="$API_PUBLIC_URL" pm2 start npm --name "$VENDOR_PM2" -- start -- -p "$VENDOR_PORT"

            pm2 save

            if command -v nginx > /dev/null; then
              sudo systemctl reload nginx || sudo systemctl restart nginx
            fi
