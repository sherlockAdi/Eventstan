name: Deploy EventStan Applications

on:
  push:
   branches:
    - main

jobs:
  deploy:
    runs-on: ubuntu-latest


    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          port: 22
          script: |
            set -e

            cd /var/www/Eventstan

            git pull origin main

            # API

            cd Api
            # npm install --force
            npm run build
            pm2 restart eventstan-api || pm2 start npm --name eventstan-api -- run start

            # Admin Panel (3001)

            cd ../Enentatan_Admin_Panel
            # npm install --force
            npm run build
            PORT=3001 pm2 restart eventstan-admin || PORT=3001 pm2 start npm --name eventstan-admin -- start

            # Customer Panel (3002)

            cd ../Enentstan_Customer_Panel
            # npm install --force
            npm run build
            PORT=3002 pm2 restart eventstan-customer || PORT=3002 pm2 start npm --name eventstan-customer -- start

            # Vendor Panel (3003)

            cd ../Enentstan_Vendor_Pannel
            # npm install --force
            npm run build
            PORT=3003 pm2 restart eventstan-vendor || PORT=3003 pm2 start npm --name eventstan-vendor -- start

            pm2 save

            systemctl restart nginx
