name: Deploy EventStan Applications

on:
  push:
   branches:
    - main

jobs:
  deploy:
    runs-on: ubuntu-latest


    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          port: 22
          script: |
            set -e

            cd /var/www/Eventstan
            git fetch origin main
            git reset --hard origin/main

            # API

            cd Api
            npm ci
            npm run prisma:generate
            npx prisma migrate deploy
            npm run build
            pm2 delete eventstan-api || true
            pm2 start npm --name eventstan-api -- run start:prod

            # Admin Panel (3001)

            cd ../Enentatan_Admin_Panel
            npm install
            npm run build
            PORT=3001 pm2 restart eventstan-admin --update-env || PORT=3001 pm2 start npm --name eventstan-admin -- start

            # Customer Panel (3002)

            cd ../Enentstan_Customer_Panel
            npm ci
            npm run build
            PORT=3002 pm2 restart eventstan-customer --update-env || PORT=3002 pm2 start npm --name eventstan-customer -- start

            # Vendor Panel (3003)

            cd ../Enentstan_Vendor_Pannel
            npm ci
            npm run build
            PORT=3003 pm2 restart eventstan-vendor --update-env || PORT=3003 pm2 start npm --name eventstan-vendor -- start

            pm2 save

            systemctl restart httpd
